name: Release Readiness

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.11

      - name: Verify
        run: uv run verify

  mutation_benchmark_quality:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.11

      - name: Clean dist
        run: |
          rm -rf dist
          mkdir -p dist

      - name: Quality benchmark
        run: uv run benchmark quality --baseline .ci/benchmark-baseline.json --json-out dist/benchmark-quality.json

      - name: Upload quality benchmark artifact
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: release-benchmark-quality
          path: dist/benchmark-quality.json

  build:
    runs-on: ubuntu-latest
    needs: [verify, mutation_benchmark_quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.11

      - name: Clean dist
        run: |
          rm -rf dist
          mkdir -p dist

      - name: Build root package
        run: uv build

      - name: Build server package
        run: cd server && uv build

      - name: Normalize dist artifacts
        run: |
          rm -f dist/pymutant_mcp*
          ls -1 dist/

      - name: Verify distribution metadata
        run: uvx --from twine twine check dist/pymutant*.whl dist/pymutant*.tar.gz

      - name: Generate checksums
        run: sha256sum dist/pymutant*.whl dist/pymutant*.tar.gz > dist/SHA256SUMS

      - name: Verify checksums
        run: sha256sum -c dist/SHA256SUMS

      - name: Upload release artifacts
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/
