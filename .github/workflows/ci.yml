name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv (act)
        if: ${{ github.actor == 'nektos/act' }}
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup uv
        if: ${{ github.actor != 'nektos/act' }}
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.11

      - name: Prepare artifact directory
        run: mkdir -p dist

      - name: Bandit report
        run: uv run bandit -r server/src/pymutant src/repo_verify -f json -o dist/bandit-report.json -ll

      - name: Upload Bandit artifact
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: dist/bandit-report.json

      - name: Docs link check (remote)
        run: uv run python scripts/check_markdown_links.py --root . --check-remote --timeout 10 --retries 2

      - name: Verify
        run: uv run verify

      - name: MCP smoke
        run: uv run mcp-smoke --project-root . --base-ref HEAD

  mutation_benchmark_throughput:
    if: ${{ github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.11

      - name: Clean dist
        run: |
          rm -rf dist
          mkdir -p dist

      - name: Throughput benchmark
        run: uv run benchmark throughput --baseline .ci/benchmark-baseline.json --json-out dist/benchmark-throughput.json

      - name: Validate throughput schema
        run: uv run python scripts/validate_json_schema.py --data dist/benchmark-throughput.json --schema schemas/benchmark-throughput.schema.json

      - name: Upload throughput benchmark artifact
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-throughput
          path: dist/benchmark-throughput.json

  mutation_zero_survivors:
    if: ${{ (github.event_name == 'pull_request' || github.event_name == 'push') && github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.11

      - name: Mutation zero-survivor gate
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            uv run mutation-gate --changed-only --base-ref "origin/${{ github.base_ref }}" --max-rounds 4 --max-seconds 900 --max-interruptions 8 --json-out dist/mutation-gate.json
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            uv run mutation-gate --changed-only --base-ref "${{ github.event.before }}" --max-rounds 4 --max-seconds 900 --max-interruptions 8 --json-out dist/mutation-gate.json
          else
            uv run mutation-gate --max-rounds 4 --max-seconds 900 --max-interruptions 8 --json-out dist/mutation-gate.json
          fi

      - name: Upload mutation gate artifact
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: mutation-gate
          path: dist/mutation-gate.json

  mutation_benchmark_quality:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.11

      - name: Clean dist
        run: |
          rm -rf dist
          mkdir -p dist

      - name: Quality benchmark
        run: uv run benchmark quality --baseline .ci/benchmark-baseline.json --json-out dist/benchmark-quality.json

      - name: Validate quality schema
        run: uv run python scripts/validate_json_schema.py --data dist/benchmark-quality.json --schema schemas/benchmark-quality.schema.json

      - name: Render HTML report bundle
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          from pymutant import results, score
          from pymutant.policy import evaluate_policy
          from pymutant.reporting import render_html_bundle
          from pymutant.trends import trend_report

          root = Path(".").resolve()
          render_html_bundle(
              score=score.compute_score(project_root=root),
              results=results.get_results(include_killed=False, project_root=root),
              policy=evaluate_policy(current_score=float(score.compute_score(project_root=root)["score"]), project_root=root),
              trend=trend_report(score.load_score_history(project_root=root)),
              project_root=root,
          )
          PY

      - name: Upload quality benchmark artifact
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-quality
          path: dist/benchmark-quality.json

      - name: Upload HTML report artifact
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-html
          path: dist/pymutant-report.html

  build:
    if: ${{ github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    needs: [verify, mutation_benchmark_throughput]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.11

      - name: Clean dist
        run: |
          rm -rf dist
          mkdir -p dist

      - name: Build root package
        run: uv build

      - name: Build server package
        run: cd server && uv build

      - name: Normalize dist artifacts
        run: |
          rm -f dist/pymutant_mcp*
          ls -1 dist/

      - name: Verify distribution metadata
        run: uvx --from twine twine check dist/pymutant*.whl dist/pymutant*.tar.gz

      - name: Generate checksums
        run: sha256sum dist/pymutant*.whl dist/pymutant*.tar.gz > dist/SHA256SUMS

      - name: Verify checksums
        run: sha256sum -c dist/SHA256SUMS
